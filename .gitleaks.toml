# gitleaks configuration
# https://github.com/gitleaks/gitleaks
#
# Extends the gitleaks default ruleset and includes rules inlined from the
# vercel-deploy-scripts shared ruleset (rmartz/vercel-deploy-scripts).
# Rules are inlined rather than referenced via node_modules so that gitleaks
# can run in CI without requiring a prior `pnpm install`.

title = "personal-budget"

[extend]
useDefault = true

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
paths = [
  # Contains only placeholder values
  ".env.example",
]
regexes = [
  # Placeholder values used in .env.example and documentation
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
  # Example/truncated keys in ARCHITECTURE.md and README
  '''xxx@o\w+\.ingest\.sentry\.io''',
  # Allowlists inlined from vercel-deploy-scripts shared ruleset
  '''YOUR_[A-Z0-9_]*''',
  '''PLACEHOLDER_[A-Z0-9_]*''',
  '''<[^>]+>''',
  '''(?i)^example$''',
  '''(?i)^changeme$''',
]

# Rules inlined from vercel-deploy-scripts shared ruleset

[[rules]]
id = "firebase-private-key"
description = "Firebase service account private key"
regex = '''-----BEGIN PRIVATE KEY-----'''
tags = ["firebase", "key"]

[rules.allowlist]
regexes = ['''YOUR_PRIVATE_KEY''', '''<private_key>''']

[[rules]]
id = "firebase-service-account-json"
description = "Firebase service account JSON blob"
regex = '''"type"\s*:\s*"service_account"'''
tags = ["firebase", "credentials"]

[rules.allowlist]
regexes = ['''YOUR_SERVICE_ACCOUNT''', '''<service_account>''']

[[rules]]
id = "vercel-api-token"
description = "Vercel API token"
regex = '''(?:vercel_[a-zA-Z0-9]{24,}|(?:VERCEL_TOKEN|VERCEL_API_TOKEN)\s*=\s*[a-zA-Z0-9_\-]{20,})'''
tags = ["vercel", "token"]

[rules.allowlist]
regexes = ['''vercel_YOUR_.*''', '''vercel_PLACEHOLDER_.*''', '''<vercel[_-]token>''']

# Project-specific rules not covered by the shared vercel-deploy-scripts ruleset

[[rules]]
id = "firebase-admin-json"
description = "Firebase service account JSON blob (private_key_id field)"
regex = '''"private_key_id"\s*:\s*"[a-f0-9]{40}"'''
tags = ["firebase", "key"]
