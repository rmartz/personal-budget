name: "Install Playwright Chromium"
description: "Cache-restore and install Chromium for Playwright, with a retry. Run after ./.github/actions/setup so pnpm and playwright resolve."

runs:
  using: "composite"
  steps:
    - id: version
      shell: bash
      run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
    - uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ steps.version.outputs.version }}
    - name: Install Chromium
      shell: bash
      # Retry: `--with-deps` runs apt-get, which can fail on a transient runner
      # repo hiccup; scope the retry to this known-flaky install step. On a warm
      # cache the ~130MB Chromium download is skipped (already in ~/.cache/
      # ms-playwright); the apt system-deps step still runs (not cacheable) but
      # is fast.
      run: |
        for attempt in 1 2 3; do
          if pnpm exec playwright install --with-deps chromium; then
            exit 0
          fi
          echo "Playwright install attempt $attempt failed; retrying in 15s..." >&2
          sleep 15
        done
        echo "Playwright install failed after 3 attempts." >&2
        exit 1
