name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  # Detects whether a PR touches anything beyond inert documentation, so the
  # heavy code-validation jobs can skip doc-only PRs. Denylist, not allowlist:
  # code_changed defaults to true and is only cleared when EVERY changed file is
  # provably-inert docs, so a new/unanticipated file type fails safe (runs CI).
  # On push (e.g. to main) it is always true.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
      stories_changed: ${{ steps.filter.outputs.stories_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            echo "stories_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          code_changed=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              # Inert documentation — anything else trips the full suite.
              *.md | docs/* | LICENSE | *.txt) ;;
              *)
                code_changed=true
                break
                ;;
            esac
          done <<< "$changed"
          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"
          # A changed Storybook story implies an intended visual change worth a
          # fresh screenshot; the advisory screenshots job gates on this.
          if printf '%s\n' "$changed" | grep -Eq '\.stories\.(ts|tsx)$'; then
            echo "stories_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "stories_changed=false" >> "$GITHUB_OUTPUT"
          fi

  tests:
    name: Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Headless Vitest projects only — no browser, so no Playwright install.
      - run: pnpm exec vitest run --project node --project hooks --project components

  storybook-tests:
    name: Storybook Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/playwright-chromium
      - run: pnpm exec vitest run --project storybook

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  type-check:
    name: Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  storybook-build:
    name: Storybook Build
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build-storybook

  # Advisory visual-acceptance aid: builds Storybook, screenshots every story
  # from the static build, and uploads them as an artifact. Runs only when a
  # story changed (an intended visual change worth eyeballing); continue-on-error
  # keeps it non-blocking, so the correctness gates (Tests, Storybook Tests,
  # Lint, Format, Type Check, Build, Storybook Build) remain hard-gating. The
  # captured render path is covered for compile by the gating Storybook Build
  # job. No concurrency group is needed — the artifact surface is per-run, so
  # concurrent PR runs never race on a shared resource.
  storybook-screenshots:
    name: Storybook Screenshots
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.stories_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/playwright-chromium
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Capture screenshots
        # No step-level continue-on-error: a capture failure (a broken or slow
        # story) must surface as a job *failure* so the coordinator routes it to
        # fix-review. The script fails fast — stories run concurrently with a
        # short per-story render budget and an overall wall-clock deadline below
        # this job's timeout-minutes — so the job never hits its timeout and gets
        # *cancelled* (which escalates to a human instead). Job-level
        # continue-on-error still keeps the failure non-blocking for the run.
        run: node scripts/capture-screenshots.mjs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: storybook-screenshots
          path: screenshots/
          if-no-files-found: warn
