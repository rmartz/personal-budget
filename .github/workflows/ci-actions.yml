name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  # Detects whether a PR touches anything beyond inert documentation, so the
  # heavy code-validation jobs can skip doc-only PRs. Denylist, not allowlist:
  # code_changed defaults to true and is only cleared when EVERY changed file is
  # provably-inert docs, so a new/unanticipated file type fails safe (runs CI).
  # On push (e.g. to main) it is always true.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code_changed=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              # Inert documentation — anything else trips the full suite.
              *.md | docs/* | LICENSE | *.txt) ;;
              *)
                code_changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"

  tests:
    name: Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Headless Vitest projects only — no browser, so no Playwright install.
      - run: pnpm exec vitest run --project node --project hooks --project components

  storybook-tests:
    name: Storybook Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Install Playwright Chromium
        # Retry to ride out transient apt/CDN failures during --with-deps.
        run: |
          for attempt in 1 2 3; do
            pnpm exec playwright install --with-deps chromium && exit 0
            echo "playwright install attempt $attempt failed; retrying..." >&2
            sleep 5
          done
          echo "playwright install failed after 3 attempts" >&2
          exit 1
      - run: pnpm exec vitest run --project storybook

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  type-check:
    name: Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  storybook-build:
    name: Storybook Build
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build-storybook

  storybook-screenshots:
    name: Storybook Screenshots
    if: github.event_name == 'pull_request'
    # Advisory only: PR-preview decoration built on a flaky third-party beta
    # action. A hang or failure must report neutral, never block merge. The
    # correctness gates (Tests, Storybook Tests, Lint, Format, Type Check,
    # Build) remain hard-gating.
    continue-on-error: true
    concurrency:
      group: storybook-screenshots-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Generate changed files list
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" > changed-files.txt
      - id: screenshot-config
        name: Generate screenshot config for changed stories
        run: |
          node scripts/generate-storybook-screenshots-config.mjs \
            --changed-files=changed-files.txt \
            --output=.github/screenshots.dynamic.yml \
            --github-output="$GITHUB_OUTPUT"
      - name: Install Playwright Chromium
        if: steps.screenshot-config.outputs.has_stories == 'true'
        run: pnpm exec playwright install chromium
      - name: Start Storybook
        if: steps.screenshot-config.outputs.has_stories == 'true'
        run: pnpm storybook --ci --port 6006 &
      - name: Wait for Storybook
        if: steps.screenshot-config.outputs.has_stories == 'true'
        run: |
          # Max wait: 2 minutes, checking every 2 seconds.
          TIMEOUT_SECONDS=120
          RETRY_INTERVAL=2
          MAX_ATTEMPTS=$((TIMEOUT_SECONDS / RETRY_INTERVAL))

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if curl --silent --show-error --fail http://127.0.0.1:6006 >/dev/null; then
              echo "Storybook is ready."
              exit 0
            fi
            sleep "$RETRY_INTERVAL"
          done
          echo "Storybook did not start in time." >&2
          exit 1
      - name: Capture Storybook screenshots
        if: steps.screenshot-config.outputs.has_stories == 'true'
        uses: yoavf/auto-pr-screenshots-action@v1.4.0-beta
        with:
          config-file: .github/screenshots.dynamic.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
