name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Required by gitleaks-action@v2 to post inline PR annotations
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-config:
    name: Validate deployment config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: node scripts/validate-config.mjs
