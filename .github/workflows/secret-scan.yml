name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    name: Detect secrets
    permissions:
      contents: read
      pull-requests: write # Required by gitleaks-action@v2 to post inline PR annotations
    uses: rmartz/vercel-deploy-scripts/.github/workflows/secret-scan.yml@v1.7.0
    with:
      config-path: .gitleaks.toml
      install-deps: true

  validate-config:
    name: Validate deployment config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: node scripts/validate-config.mjs
