name: Sentry Source Maps

# Uploads source maps to Sentry after every push to main so that production
# stack traces resolve to original TypeScript source lines.
#
# SENTRY_AUTH_TOKEN is stored as a GitHub Actions secret (CI org token with
# code-mapping / source-map upload scope). The upload step is skipped when the
# secret is absent so forks and branches without the secret do not fail.

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  upload-sourcemaps:
    name: Upload Source Maps
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      # Build the app to produce source maps in .next/
      - name: Build
        run: pnpm build
        env:
          # Provide placeholder Firebase config so the build does not crash on
          # missing env vars — source map generation does not need real values.
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: placeholder

      # Upload source maps to Sentry and associate them with the release SHA.
      # Skipped when SENTRY_AUTH_TOKEN is not set (forks / branches).
      - name: Upload source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          pnpm exec sentry-cli sourcemaps inject .next
          pnpm exec sentry-cli sourcemaps upload \
            --org reedmartz \
            --project personal-budget \
            --release "${{ github.sha }}" \
            .next
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
