name: File Length

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check file lengths
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check changed file lengths
        run: |
          base=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          node scripts/check-file-length.mjs --base "$base"
