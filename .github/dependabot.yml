version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Let new releases age 7 days before Dependabot proposes them, reducing
    # exposure to compromised/yanked packages from supply-chain attacks.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group only minor and patch bumps so routine version churn arrives in one
    # batched PR per dependency type. Major bumps match no group and are raised
    # as individual PRs, since they more often need code changes and warrant
    # isolated review.
    groups:
      # Prettier (and its plugins) gets its own group for major/minor bumps so a
      # formatting-affecting upgrade lands in an isolated PR — a Prettier minor
      # bump can reformat the whole tree and require code changes, which must not
      # be buried in a batched dev-dependencies PR. Listed first to win
      # group-assignment precedence (a dependency joins the first group whose
      # patterns AND update-types match). Patch bumps are intentionally excluded
      # here, so trivial Prettier patches fall through to the dev-dependencies
      # group and ride along with the routine batch.
      prettier:
        patterns:
          - "prettier"
          - "prettier-plugin-*"
        update-types:
          - "major"
          - "minor"
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: production
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Same 7-day cooldown for action updates — a compromised action tag is a
    # direct supply-chain risk to CI.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
